spring.application.name=demo2

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/db_demo}
spring.datasource.username=${DB_USERNAME:santiago_db}
spring.datasource.password=${DB_PASSWORD:pos2004}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# API Key para endpoints protegidos (placeholder hasta migrar a Spring Security)
app.api-key=${APP_API_KEY:postulaciones-2026-secret-key}
app.frontend-url=${FRONTEND_URL:http://localhost:5500}

# Configuración de producción
spring.jpa.show-sql=false
